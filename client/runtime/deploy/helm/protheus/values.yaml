nameOverride: ""
fullnameOverride: ""

image:
  repository: protheuslabs/infring
  tag: latest
  pullPolicy: IfNotPresent
  pullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

runtimeConfig:
  CLEARANCE: "3"
  NODE_ENV: "production"
  SPINE_PUBLIC_BENCHMARK_ENABLED: "0"
  SPINE_WORKFLOW_LAYER_ENABLED: "1"
  SPINE_STRATEGY_PRINCIPLES_ENABLED: "1"
  PROTHEUS_TELEMETRY_OPT_IN: "0"

cron:
  enabled: true
  schedule: "0 */4 * * *"
  command:
    - node
    - client/runtime/systems/spine/spine.ts
    - daily
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  backoffLimit: 1

daemon:
  enabled: true
  replicas: 2
  command:
    - node
    - client/runtime/systems/ops/protheusd.ts
    - run
  args: []
  strategy:
    type: RollingUpdate

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

persistence:
  state:
    sizeLimit: "2Gi"
  logs:
    sizeLimit: "2Gi"
  tmp:
    sizeLimit: "1Gi"

networkPolicy:
  enabled: true
  allowDns: true
  allowHttps: true
  allowOidc: true
  allowVault: true

secrets:
  existingSecretName: ""
  create: false
  optional: true
  data: {}
  vault:
    enabled: false
    role: ""
    path: ""
  kms:
    enabled: false
    provider: ""
    keyId: ""

sso:
  enabled: false
  provider: oidc
  issuerUrl: ""
  audience: ""
  clientId: ""
  clientSecretRef: ""

scheduling:
  nodeSelector: {}
  tolerations: []
  affinity: {}

nvidia:
  enabled: false
  runtimeClassName: ""
  gpuCount: 1

conformance:
  enabled: true
