{{- if .Values.cron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "protheus.fullname" . }}-daily
  labels:
    app.kubernetes.io/name: {{ include "protheus.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.cron.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.cron.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cron.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.cron.backoffLimit }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "protheus.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: daily-orchestrator
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: spine-daily
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
{{- range .Values.cron.command }}
                - {{ . | quote }}
{{- end }}
              envFrom:
                - configMapRef:
                    name: {{ include "protheus.fullname" . }}-runtime
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
{{ toYaml .Values.resources | indent 16 }}
              volumeMounts:
                - name: state
                  mountPath: /app/state
                - name: logs
                  mountPath: /app/logs
                - name: tmp
                  mountPath: /tmp
                - name: app-tmp
                  mountPath: /app/tmp
          volumes:
            - name: state
              emptyDir: {}
            - name: logs
              emptyDir: {}
            - name: tmp
              emptyDir: {}
            - name: app-tmp
              emptyDir: {}
{{- end }}
