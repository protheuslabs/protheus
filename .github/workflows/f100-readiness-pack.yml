name: F100 Readiness Pack

on:
  push:
    paths:
      - "client/runtime/config/f100_readiness_program_policy.json"
      - "client/runtime/config/compliance_control_map.json"
      - "client/runtime/config/one_million_performance_profile.json"
      - "client/runtime/config/multi_tenant_isolation_contract.json"
      - "client/runtime/config/api_cli_contract_registry.json"
      - "client/runtime/config/oncall_incident_policy.json"
      - "client/runtime/config/operator_surface_consistency_policy.json"
      - "core/layer0/ops/src/f100_readiness_program.rs"
      - "docs/client/onboarding/**"
      - "docs/client/ops/ENTERPRISE_ARCHITECTURE_EVIDENCE_PACK.md"
      - "docs/client/ops/operator_surface_consistency_snapshot.json"
      - "runbooks/INCIDENT_COMMAND.md"
      - "runbooks/POSTMORTEM_TEMPLATE.md"
      - "scripts/onboarding/protheus_onboarding_bootstrap.sh"
      - ".github/workflows/f100-readiness-pack.yml"
  pull_request:
    paths:
      - "client/runtime/config/f100_readiness_program_policy.json"
      - "client/runtime/config/compliance_control_map.json"
      - "client/runtime/config/one_million_performance_profile.json"
      - "client/runtime/config/multi_tenant_isolation_contract.json"
      - "client/runtime/config/api_cli_contract_registry.json"
      - "client/runtime/config/oncall_incident_policy.json"
      - "client/runtime/config/operator_surface_consistency_policy.json"
      - "core/layer0/ops/src/f100_readiness_program.rs"
      - "docs/client/onboarding/**"
      - "docs/client/ops/ENTERPRISE_ARCHITECTURE_EVIDENCE_PACK.md"
      - "docs/client/ops/operator_surface_consistency_snapshot.json"
      - "runbooks/INCIDENT_COMMAND.md"
      - "runbooks/POSTMORTEM_TEMPLATE.md"
      - "scripts/onboarding/protheus_onboarding_bootstrap.sh"
      - ".github/workflows/f100-readiness-pack.yml"

jobs:
  f100-readiness-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Seed dependent receipts for strict readiness lanes
        run: |
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            sdlc-change-control run --strict=0
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            supply-chain-provenance-v2 run --strict=0
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-reliability-certification run --strict=0

      - name: Run readiness lanes
        run: |
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-004 --strict=1
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-005 --strict=1
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-006 --strict=0
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-007 --strict=1
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-008 --strict=0
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-009 --strict=0
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-010 --strict=1
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-011 --strict=1
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-012 --strict=0
