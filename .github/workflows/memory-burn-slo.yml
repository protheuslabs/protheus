name: Memory Burn SLO

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  memory-burn-guard:
    runs-on: ubuntu-latest
    env:
      PROTHEUS_OPS_LOCAL_TIMEOUT_MS: "180000"
      PROTHEUS_OPS_DOMAIN_BRIDGE_TIMEOUT_MS: "60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: Install npm dependencies
        run: npm ci --include=dev
      - name: Run memory burn SLO guard
        run: node tests/client-memory-tools/memory_burn_slo_guard.test.js
