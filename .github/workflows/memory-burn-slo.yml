name: Memory Burn SLO

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  memory-burn-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install npm dependencies
        run: npm ci --include=dev
      - name: Run memory burn SLO guard
        run: node tests/client-memory-tools/memory_burn_slo_guard.test.js
