name: empty-fort-visuals

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag override'
        required: false
        type: string

jobs:
  build-visual-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate visual metrics
        run: |
          TAG="${{ github.event.inputs.release_tag || github.ref_name }}"
          node tests/tooling/scripts/empty_fort_visuals.js --release-tag="$TAG" --out-dir=artifacts/empty-fort

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v7
        with:
          name: empty-fort-visual-metrics-${{ github.run_id }}
          path: artifacts/empty-fort/
