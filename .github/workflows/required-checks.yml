name: Required Checks

on:
  workflow_dispatch:

jobs:
  typecheck_systems:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: typecheck_systems
        run: npm run typecheck:systems

  integrity_kernel_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: integrity_kernel_check
        run: node client/runtime/systems/security/integrity_kernel.js run

  contract_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: contract_check
        run: node client/runtime/systems/spine/contract_check.js

  foundation_contract_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: foundation_contract_gate
        run: node client/runtime/systems/ops/foundation_contract_gate.js run --strict=1

  scale_envelope_baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: scale_envelope_baseline
        run: node client/runtime/systems/ops/scale_envelope_baseline.js run --strict=1

  js_holdout_audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: js_holdout_audit
        run: node client/runtime/systems/ops/js_holdout_audit.js run --strict=1

  schema_contract_check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: schema_contract_check
        run: node client/runtime/systems/security/schema_contract_check.js run

  adaptive_layer_guard_strict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: adaptive_layer_guard_strict
        run: node client/runtime/systems/sensory/adaptive_layer_guard.js run --strict

  docs_coverage_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: docs_coverage_gate
        run: node client/runtime/systems/ops/docs_coverage_gate.js run --strict=1

  source_runtime_classifier:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: source_runtime_classifier
        run: npm run ops:source-runtime:check

  subconscious_boundary_guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: subconscious_boundary_guard
        run: npm run ops:subconscious-boundary:check

  deployment_packaging_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: deployment_packaging_gate
        run: node client/runtime/systems/ops/deployment_packaging.js run --profile=prod --strict=1

  compliance_posture_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: compliance_posture_gate
        run: node client/runtime/systems/ops/compliance_posture.js run --profile=prod --strict=1

  dr_gameday_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: dr_gameday_gate
        run: node client/runtime/systems/ops/dr_gameday_gate.js run --strict=1

  security_threat_pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: security_threat_pack
        run: node tests/client-memory-tools/security_threat_pack.test.js

  enterprise_hardening_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: enterprise_hardening_gate
        run: cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- enterprise-hardening run --strict=1

  ci_suite:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: test_ci
        run: npm run test:ci

  dependabot_contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify Dependabot config
        run: |
          test -f .github/dependabot.yml
          grep -q "package-ecosystem: \"cargo\"" .github/dependabot.yml
          grep -q "package-ecosystem: \"npm\"" .github/dependabot.yml
          grep -q "package-ecosystem: \"github-actions\"" .github/dependabot.yml

  ghas_code_scanning_contract:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Verify CodeQL workflow contract
        run: |
          test -f .github/workflows/codeql.yml
          grep -q "github/codeql-action/init@v3" .github/workflows/codeql.yml
          grep -q "github/codeql-action/analyze@v3" .github/workflows/codeql.yml
