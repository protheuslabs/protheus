name: Formal Proof Runtime

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]
  workflow_dispatch:

jobs:
  formal-proof-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run formal proof runtime gate
        run: npm run -s ops:formal-proof:run

      - name: Upload formal proof artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: formal-proof-runtime-artifacts
          path: |
            client/local/state/ops/formal_proof_runtime_gate/latest.json
            client/local/state/ops/formal_proof_runtime_gate/receipts.jsonl
            client/docs/reports/runtime_snapshots/ops/proof_pack/formal_proof_runtime_latest.json
          if-no-files-found: warn
