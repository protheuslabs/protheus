name: Formal Proof Runtime

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]
  workflow_dispatch:

jobs:
  formal-proof-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Kani verifier
        run: |
          cargo install --locked kani-verifier
          cargo kani setup

      - name: Run formal proof runtime gate
        run: npm run -s ops:formal-proof:run

      - name: Upload formal proof artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: formal-proof-runtime-artifacts
          path: |
            core/local/state/ops/top1_assurance/latest.json
            core/local/state/ops/top1_assurance/history.jsonl
            proofs/layer0/core_formal_coverage_map.json
          if-no-files-found: warn
