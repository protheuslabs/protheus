name: Protheusd Static Size Gate

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]
  workflow_dispatch:

jobs:
  protheusd-size-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install musl toolchain
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build static protheusd
        run: |
          cargo build --release --target x86_64-unknown-linux-musl --manifest-path core/layer0/ops/Cargo.toml --bin protheusd
          strip target/x86_64-unknown-linux-musl/release/protheusd || true
          ls -lh target/x86_64-unknown-linux-musl/release/protheusd
          file target/x86_64-unknown-linux-musl/release/protheusd

      - name: Enforce static size gate
        run: |
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            top1-assurance size-gate --strict=1

      - name: Upload size-gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protheusd-size-gate-artifacts
          path: |
            target/x86_64-unknown-linux-musl/release/protheusd
            core/local/state/ops/top1_assurance/latest.json
            core/local/state/ops/top1_assurance/history.jsonl
          if-no-files-found: warn
