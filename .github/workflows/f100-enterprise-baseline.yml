name: F100 Enterprise Baseline

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]

jobs:
  f100-enterprise-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROTHEUS_OPS_LOCAL_TIMEOUT_MS: "180000"
      PROTHEUS_OPS_DOMAIN_BRIDGE_TIMEOUT_MS: "60000"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install npm dependencies
        run: npm ci --include=dev

      - name: Verify baseline contract (Rust authoritative)
        run: npm run -s ops:f100-enterprise-baseline

      - name: Upload baseline status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: f100-enterprise-baseline
          path: |
            local/state/ops/f100_readiness_program/v6_f100_012/latest.json
            local/state/ops/executive_readiness_scorecard/latest.json
