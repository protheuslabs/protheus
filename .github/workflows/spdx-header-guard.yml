name: SPDX Header Guard

on:
  push:
    paths:
      - "crates/**"
      - "client/runtime/config/spdx_header_guard_baseline.txt"
      - "client/runtime/config/f100_readiness_program_policy.json"
      - "core/layer0/ops/src/f100_readiness_program.rs"
      - ".github/workflows/spdx-header-guard.yml"
  pull_request:
    paths:
      - "crates/**"
      - "client/runtime/config/spdx_header_guard_baseline.txt"
      - "client/runtime/config/f100_readiness_program_policy.json"
      - "core/layer0/ops/src/f100_readiness_program.rs"
      - ".github/workflows/spdx-header-guard.yml"

jobs:
  spdx-header-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run SPDX header guard lane
        run: |
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            f100-readiness-program run --lane=V6-F100-035 --strict=1 --apply=0
