name: Formal Spec Guard

on:
  pull_request:
    branches: [main, rust50]
  push:
    branches: [main, rust50]

jobs:
  formal-spec-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Conduit Boundary Guard
        run: npm run -s ops:dependency-boundary:check

      - name: Formal Spec Guard
        run: npm run -s ops:formal-spec:check

      - name: Client Layer Boundary Audit
        run: npm run -s ops:client-layer:boundary

      - name: Repo Surface Policy Audit
        run: npm run -s ops:repo-surface:audit

      - name: Public Platform Contract Audit
        run: npm run -s ops:public-platform:contract
