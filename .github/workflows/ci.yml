name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PROTHEUS_OPS_LOCAL_TIMEOUT_MS: "180000"
      PROTHEUS_OPS_DOMAIN_BRIDGE_TIMEOUT_MS: "60000"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format Guard
        run: node tests/client-memory-tools/org_code_format_guard.test.js

      - name: Lint
        run: npm run lint

      - name: Persona Docs Validation
        run: node tests/client-memory-tools/personas_orchestration_policies.test.js

      - name: Test
        run: npm run test

      - name: Source Runtime Classifier
        run: npm run ops:source-runtime:check

      - name: Simplicity Drift Audit
        run: npm run -s ops:simplicity:audit

      - name: Benchmark Sanity Gate
        run: npm run -s ops:benchmark:sanity

      - name: Flaky Quarantine Audit
        run: npm run -s ops:flaky:quarantine:audit

      - name: Test Priority Manifest Audit
        run: npm run -s ops:test-priority:audit

      - name: Strategic Contract Registry Audit
        run: npm run -s ops:strategic-contracts:audit

      - name: Queue Hardening Contracts
        run: npm run ops:race-queue:hardening

      - name: Mobile Benchmark Matrix (Smoke)
        run: node tests/client-memory-tools/mobile_competitive_benchmark_matrix.test.js
