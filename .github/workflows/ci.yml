name: CI

on:
  push:
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Queue Hardening Contracts
        run: npm run ops:race-queue:hardening

      - name: Mobile Benchmark Matrix (Smoke)
        run: node systems/ops/mobile_competitive_benchmark_matrix.js run --owner=ci --scenario=ci_mobile_android --target=android --battery-drain-hour=2.4 --thermal=39 --survival-hours=72 --sync-integrity=0.998 --apply=0
