name: Nightly Fuzz And Chaos

on:
  schedule:
    - cron: "13 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz-and-chaos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fuzz preflight (non-fatal when no fuzz targets exist)
        run: |
          cargo install cargo-fuzz --locked || true
          if [ -d fuzz ] && [ -n "$(find fuzz -name '*.rs' -maxdepth 3 2>/dev/null)" ]; then
            cargo fuzz list || true
          else
            echo "no_fuzz_targets_detected"
          fi

      - name: Generate fuzz + chaos evidence report
        run: |
          node scripts/ci/nightly_fuzz_chaos_report.mjs

      - name: Upload fuzz + chaos report artifact
        uses: actions/upload-artifact@v7
        with:
          name: nightly-fuzz-chaos-report
          path: artifacts/nightly_fuzz_chaos_report_*.json
          if-no-files-found: error
