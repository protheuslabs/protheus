name: repo-hygiene-generated

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  generated-artifacts-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install npm dependencies
        run: npm ci --include=dev
      - name: Verify generated artifacts are not staged (legacy wrapper)
        run: |
          node tests/client-memory-tools/repo_hygiene_generated_guard.test.js
      - name: Verify runtime hygiene lane (legacy wrapper)
        run: |
          node tests/client-memory-tools/repo_hygiene_guard.test.js
