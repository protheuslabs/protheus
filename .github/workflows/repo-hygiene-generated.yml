name: repo-hygiene-generated

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  generated-artifacts-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Verify generated artifacts are not staged
        run: |
          node client/systems/ops/repo_hygiene_generated_guard.js check --strict=1
      - name: Verify runtime state compat links and tracked-state hygiene
        run: |
          node client/lib/ts_entrypoint.js client/systems/ops/runtime_state_surface_guard.ts check --strict=1
