name: SDLC Change Control

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  sdlc-change-control:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build changed-path + PR-body inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p state/ops/sdlc_change_control

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > state/ops/sdlc_change_control/changed_paths.txt

          python3 - <<'PY'
import json
import os
from pathlib import Path

event_path = os.environ.get("GITHUB_EVENT_PATH", "")
body = ""
if event_path and Path(event_path).exists():
    with open(event_path, "r", encoding="utf-8") as fh:
        payload = json.load(fh)
    body = (payload.get("pull_request") or {}).get("body") or ""
Path("state/ops/sdlc_change_control/pr_body.md").write_text(f"{body}\n", encoding="utf-8")
PY

      - name: Enforce SDLC change-control gate
        run: |
          cargo run --quiet --manifest-path core/layer0/ops/Cargo.toml --bin protheus-ops -- \
            sdlc-change-control run --strict=1 \
            --policy=client/runtime/config/sdlc_change_control_policy.json \
            --pr-body-path=state/ops/sdlc_change_control/pr_body.md \
            --changed-paths-path=state/ops/sdlc_change_control/changed_paths.txt
